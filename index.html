    :root{--bg:#0f1727;--bg-2:#162033;--bg-3:#1c2940;--surface:rgba(21,30,47,.82);--surface-2:rgba(26,36,56,.9);--surface-3:rgba(31,44,67,.96);--border:rgba(255,255,255,.11);--border-strong:rgba(215,174,66,.28);--text:#f5f7fc;--muted:#b7c2d8;--gold:#e3b857;--gold-2:#c9972c;--green:#57d28f;--red:#ff7b86;--blue:#6cb8ff;--shadow:0 20px 55px rgba(3,8,20,.35);--glow:0 0 0 1px rgba(255,255,255,.05),0 22px 55px rgba(3,8,20,.32);--radius:18px;--radius-sm:12px;--font-body:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--font-heading:"Barlow Condensed",Impact,Haettenschweiler,"Arial Narrow Bold",sans-serif;--max:1280px}

async function renderLeaguesPage(){const page=document.getElementById('page-leagues');page.innerHTML='<div class="loading">Loading leagues...</div>';try{const data=await apiFetch('leagues',{current:'true'}).catch(()=>({response:[]}));const rows=(data.response||[]).filter(r=>r?.league?.id&&r?.league?.name);const cleaned=rows.filter(r=>{const name=String(r?.league?.name||'').toLowerCase();if(name.includes('reserve')||name.includes('reserves')||name.includes('youth')||name.includes('u17')||name.includes('u19')||name.includes('u21')) return false;return true;});const continents=['europe','south_america','north_america','asia','africa','oceania','world','other'];window.__leagueDirState=window.__leagueDirState||{continent:'europe',openCountries:{}};const activeContinent=window.__leagueDirState.continent;const enriched=cleaned.map(r=>({...r,__country:normalizeCountryName(r?.country?.name),__continent:continentForCountry(r?.country?.name),__season:getLeagueRowSeason(r)}));const continentRows=enriched.filter(r=>r.__continent===activeContinent);const countries=[...new Set(continentRows.map(r=>r.__country))].filter(Boolean).sort((a,b)=>a.localeCompare(b)).map(name=>({name,rows:continentRows.filter(r=>r.__country===name)}));const womenPattern=/(women|femin|femeni|frauen|damallsvenskan|dames|feminino|liga f|wsl)/i;const sortFn=(a,b)=>String(a.league?.name||'').localeCompare(String(b.league?.name||''));page.innerHTML=`<div class="card"><div class="toolbar"><h2 class="section-title" style="margin:0">League <span>directory</span></h2><div class="pill">${enriched.length} competitions</div></div><div class="toolbar-right">${continents.map(c=>`<button class="filter-btn ${activeContinent===c?'active':''}" onclick="window.__leagueDirState={continent:'${c}',openCountries:{}}; renderLeaguesPage();">${continentLabel(c)}</button>`).join('')}</div><div class="card" style="padding:16px;margin-top:14px"><div class="toolbar"><h3 class="section-title" style="font-size:22px;margin:0">Countries</h3><div class="mini">${countries.length}</div></div>${countries.length?`<div class="list">${countries.map(country=>{const men=country.rows.filter(r=>!womenPattern.test(String(r?.league?.name||''))).sort(sortFn);const women=country.rows.filter(r=>womenPattern.test(String(r?.league?.name||''))).sort(sortFn);const key=slugify(country.name);const isOpen=!!window.__leagueDirState.openCountries?.[key];return `<details class="country-dropdown" ${isOpen?'open':''} ontoggle="toggleLeagueCountry(${jsa(key)}, this.open)"><summary class="row-link" style="grid-template-columns:1fr auto;list-style:none;cursor:pointer"><div class="strong">${escapeHtml(country.name)}</div><div class="mini">${country.rows.length} competitions</div></summary><div style="padding:12px 0 2px"><div class="split"><div><h4 class="section-title" style="font-size:18px;margin-bottom:10px">Men</h4>${men.length?`<div class="list">${men.map(l=>`<button class="league-card" type="button" style="width:100%;text-align:left;cursor:pointer" onclick='openLeague(${Number(l.league.id)}, ${jsa(l.league.name)}, ${Number(l.__season)})'><div class="search-avatar">${imgOrFallback(l.league?.logo,l.league?.name)}</div><div><div class="strong">${escapeHtml(l.league?.name||'League')}</div><div class="mini">${escapeHtml(l.league?.type||'League')}</div></div><div class="mini gold">${escapeHtml(formatSeasonLabel(l.__season,l))}</div></button>`).join('')}</div>`:'<div class="empty">No men competitions.</div>'}</div><div><h4 class="section-title" style="font-size:18px;margin-bottom:10px">Women</h4>${women.length?`<div class="list">${women.map(l=>`<button class="league-card" type="button" style="width:100%;text-align:left;cursor:pointer" onclick='openLeague(${Number(l.league.id)}, ${jsa(l.league.name)}, ${Number(l.__season)})'><div class="search-avatar">${imgOrFallback(l.league?.logo,l.league?.name)}</div><div><div class="strong">${escapeHtml(l.league?.name||'League')}</div><div class="mini">${escapeHtml(l.league?.type||'League')}</div></div><div class="mini gold">${escapeHtml(formatSeasonLabel(l.__season,l))}</div></button>`).join('')}</div>`:'<div class="empty">No women competitions.</div>'}</div></div></div></details>`}).join('')}</div>`:'<div class="empty">No countries found.</div>'}</div></div>`;setTitle('Leagues — TransferZoneAI','Browse football leagues by continent, country and competition.')}catch(e){page.innerHTML=`<div class="error">${escapeHtml(e.message||'Could not load leagues.')}</div>`}}
function toggleLeagueCountry(key,isOpen){window.__leagueDirState=window.__leagueDirState||{continent:'europe',openCountries:{}};window.__leagueDirState.openCountries=window.__leagueDirState.openCountries||{};if(isOpen){window.__leagueDirState.openCountries[key]=true}else{delete window.__leagueDirState.openCountries[key]}}

function parseStatValue(v){
  if(v==null||v==='') return null;
  if(typeof v==='number') return v;
  const s=String(v).trim().replace('%','');
  const n=Number(s.replace(/[^0-9.\-]/g,''));
  return Number.isFinite(n)?n:null;
}
function findStat(teamStats, labels){
  const arr=teamStats?.statistics||[];
  for(const label of labels){
    const hit=arr.find(x=>String(x?.type||'').toLowerCase()===label.toLowerCase());
    if(hit) return parseStatValue(hit.value);
  }
  for(const item of arr){
    const t=String(item?.type||'').toLowerCase();
    if(labels.some(label=>t.includes(String(label).toLowerCase()))) return parseStatValue(item.value);
  }
  return null;
}
function extractMatchStats(stats){
  const home=stats?.[0]||{}; const away=stats?.[1]||{};
  return {
    homeTeam: fixName(home?.team?.name||''), awayTeam: fixName(away?.team?.name||''),
    possession: [findStat(home,['Ball Possession','possession']), findStat(away,['Ball Possession','possession'])],
    shots: [findStat(home,['Total Shots','shots on goal','total shots']), findStat(away,['Total Shots','shots on goal','total shots'])],
    xg: [findStat(home,['Expected Goals','xg','expected goals']), findStat(away,['Expected Goals','xg','expected goals'])]
  };
}
function renderMiniBar(label, homeVal, awayVal, suffix=''){
  const h=Number(homeVal||0), a=Number(awayVal||0); const total=Math.max(h+a,1); const hp=(h/total)*100; const ap=(a/total)*100;
  return `<div class="mini-stat-row"><div class="mini-stat-head"><span><strong>${escapeHtml(num(homeVal))}${suffix}</strong></span><span class="mini">${escapeHtml(label)}</span><span><strong>${escapeHtml(num(awayVal))}${suffix}</strong></span></div><div class="mini-bar"><div class="mini-bar-home" style="width:${hp}%"></div><div class="mini-bar-away" style="width:${ap}%"></div></div></div>`;
}
function eventBadge(type){
  const t=String(type||'').toLowerCase();
  if(t.includes('goal')) return ['goal','Goal'];
  if(t.includes('card')) return ['card',fixName(type||'Card')];
  if(t.includes('subst')) return ['sub','Sub'];
  return ['','Event'];
}
function renderEventRow(ev){
  const [klass,label]=eventBadge(ev?.type);
  const minute=`${ev?.time?.elapsed||0}'${ev?.time?.extra?`+${ev.time.extra}`:''}`;
  const player=fixName(ev?.player?.name||'Unknown');
  const detail=fixName(ev?.detail||ev?.comments||'');
  const assist=fixName(ev?.assist?.name||'');
  return `<div class="event-row"><div class="event-minute">${escapeHtml(minute)}</div><div><div class="strong">${escapeHtml(player)}</div><div class="mini">${escapeHtml(detail)}${assist&&assist!=='Unknown'?` • Assist: ${escapeHtml(assist)}`:''}</div></div><div class="event-badge ${klass}">${escapeHtml(label)}</div></div>`;
}
function renderScoreMatchCard(f){
  const live=['1H','HT','2H','ET','P'].includes(f?.fixture?.status?.short);
  const finished=['FT','AET','PEN'].includes(f?.fixture?.status?.short);
  const status=live?(f?.fixture?.status?.elapsed?`${f.fixture.status.elapsed}'`:'LIVE'):finished?'FT':formatKickoff(f?.fixture?.date);
  const stage=live?'Live':finished?'Finished':'Kickoff';
  const homeName=fixName(f?.teams?.home?.name||'Home');
  const awayName=fixName(f?.teams?.away?.name||'Away');
  const homeId=Number(f?.teams?.home?.id||0); const awayId=Number(f?.teams?.away?.id||0);
  const score=(finished||live)?`${num(f?.goals?.home)} - ${num(f?.goals?.away)}`:'VS';
  const venue=fixName(f?.fixture?.venue?.name||'');
  const leagueLine=`${fixName(f?.league?.name||'')} • ${fixName(f?.league?.country||'')}`;
  return `<a class="score-match-card" href="/match/${f.fixture.id}" onclick="event.preventDefault(); openMatch(${f.fixture.id});"><div class="score-top"><div class="league-line">${escapeHtml(leagueLine)}</div><div class="score-status ${live?'live':''}">${live?'<span class="blink-live"></span>':''}${escapeHtml(status)}</div></div><div class="score-board"><div class="score-teams"><div class="score-team-row"><div class="score-logo">${imgOrFallback(f?.teams?.home?.logo,homeName)}</div><div class="score-team-meta"><div class="score-team-name">${homeId?`<a href="${clubPath(homeId,homeName)}" onclick="event.preventDefault(); event.stopPropagation(); openClub(${homeId}, ${jsa(homeName)});">${escapeHtml(homeName)}</a>`:escapeHtml(homeName)}</div><div class="score-team-note">Home</div></div><div class="score-side-tag">Home</div></div><div class="score-team-row away"><div class="score-side-tag">Away</div><div class="score-team-meta"><div class="score-team-name">${awayId?`<a href="${clubPath(awayId,awayName)}" onclick="event.preventDefault(); event.stopPropagation(); openClub(${awayId}, ${jsa(awayName)});">${escapeHtml(awayName)}</a>`:escapeHtml(awayName)}</div><div class="score-team-note">Away</div></div><div class="score-logo">${imgOrFallback(f?.teams?.away?.logo,awayName)}</div></div></div><div class="score-center"><div class="score-center-main ${live?'live':''}">${escapeHtml(score)}</div><div class="score-center-sub">${escapeHtml(stage)}</div></div></div><div class="score-footer"><span>${venue?`Venue: <strong>${escapeHtml(venue)}</strong>`:''}</span><span>${!live&&!finished?`<strong>${escapeHtml(formatKickoff(f?.fixture?.date))}</strong>`:''}</span></div></a>`;
}
function renderMatchCard(f){ return renderScoreMatchCard(f) }

}



async function renderMatch(matchIdOrSlug){
  const page=document.getElementById('page-match');
  page.innerHTML='<div class="loading">Loading match...</div>';
  let id=Number(matchIdOrSlug||window.__routeMatchId||0);
  if(!id){
    const m=String(matchIdOrSlug||'').match(/(\d+)/);
    if(m) id=Number(m[1]);
  }
  if(!id){
    page.innerHTML='<div class="error">Missing match id from route.</div>';
    return;
  }
  window.__routeMatchId=id;
  try{
    const [fxRes, statsRes, eventsRes, lineupsRes]=await Promise.all([
      apiFetch('fixtures',{id}).catch(()=>({response:[]})),
      apiFetch('fixtures/statistics',{fixture:id}).catch(()=>({response:[]})),
      apiFetch('fixtures/events',{fixture:id}).catch(()=>({response:[]})),
      apiFetch('fixtures/lineups',{fixture:id}).catch(()=>({response:[]}))
    ]);
    const f=(fxRes&&fxRes.response&&fxRes.response[0])||null;
    if(!f){
      page.innerHTML='<div class="error">Could not load this match from the API.</div>';
      return;
    }
    const live=['1H','HT','2H','ET','P'].includes(f?.fixture?.status?.short);
    const finished=['FT','AET','PEN'].includes(f?.fixture?.status?.short);
    const status=live?(f?.fixture?.status?.elapsed?`${f.fixture.status.elapsed}'`:'LIVE'):finished?'FT':formatKickoff(f?.fixture?.date);
    const homeName=fixName(f?.teams?.home?.name||'Home');
    const awayName=fixName(f?.teams?.away?.name||'Away');
    const homeId=Number(f?.teams?.home?.id||0);
    const awayId=Number(f?.teams?.away?.id||0);
    const leagueName=fixName(f?.league?.name||'League');
    const leagueId=Number(f?.league?.id||0);
    const leagueSeason=Number(f?.league?.season||CURRENT_SEASON);
    const venue=fixName(f?.fixture?.venue?.name||'');
    const score=`${num(f?.goals?.home)} - ${num(f?.goals?.away)}`;
    const stats=extractMatchStats(statsRes?.response||[]);
    const events=(eventsRes?.response||[]).slice().sort((a,b)=>(Number(a?.time?.elapsed||0)-Number(b?.time?.elapsed||0)));
    const lineups=(lineupsRes?.response||[]);
    const homeLine=lineups.find(x=>Number(x?.team?.id||0)===homeId) || lineups[0] || null;
    const awayLine=lineups.find(x=>Number(x?.team?.id||0)===awayId) || lineups[1] || null;
    function renderLineupTeam(line, fallbackName, fallbackId){
      if(!line) return '<div class="empty">No lineup available.</div>';
      const starters=(line.startXI||[]).map(x=>x.player).filter(Boolean);
      return `<div class="list">${starters.map(pl=>`<button class="player-row" type="button" onclick="openPlayer(${Number(pl.id||0)}, ${jsa(pl.name||'Player')})"><div class="avatar">${imgOrFallback(pl.photo||'', pl.name||'Player')}</div><div><div class="strong">${escapeHtml(fixName(pl.name||'Player'))}</div><div class="mini">#${escapeHtml(num(pl.number))} ${escapeHtml(fixName(pl.pos||''))}</div></div><div class="mini">${escapeHtml(fixName(line?.formation||''))}</div></button>`).join('')}</div>`;
    }
    page.innerHTML=`<section class="match-hero"><div class="match-meta-top"><div class="mini">${leagueId?`<a href="${leaguePath(leagueId,leagueName)}" onclick="event.preventDefault();openLeague(${leagueId}, ${jsa(leagueName)}, ${leagueSeason});">${escapeHtml(leagueName)}</a>`:escapeHtml(leagueName)} • ${escapeHtml(fixName(f?.league?.country||''))}</div><div class="pill">${escapeHtml(status)}</div></div><div class="match-score-row"><div class="match-team-block">${homeId?`<a href="${clubPath(homeId,homeName)}" onclick="event.preventDefault();openClub(${homeId}, ${jsa(homeName)});" class="match-team-link">`:''}<div class="entity-logo" style="width:88px;height:88px">${imgOrFallback(f?.teams?.home?.logo,homeName)}</div><div class="match-team-name">${escapeHtml(homeName)}</div>${homeId?'</a>':''}</div><div class="match-score-center"><div class="match-big-score ${live?'gold':''}">${escapeHtml(score)}</div><div class="mini">${live?'Live match':finished?'Full time':'Scheduled'}</div><div class="mini">${venue?`Venue: ${escapeHtml(venue)}`:''}</div></div><div class="match-team-block">${awayId?`<a href="${clubPath(awayId,awayName)}" onclick="event.preventDefault();openClub(${awayId}, ${jsa(awayName)});" class="match-team-link">`:''}<div class="entity-logo" style="width:88px;height:88px">${imgOrFallback(f?.teams?.away?.logo,awayName)}</div><div class="match-team-name">${escapeHtml(awayName)}</div>${awayId?'</a>':''}</div></div></section>
    <section class="main-grid" style="padding-top:18px"><div class="stack"><div class="card"><div class="section-header"><h2 class="section-title">Match <span>stats</span></h2></div>${renderMiniBar('Possession', stats.possession?.[0], stats.possession?.[1], '%')}${renderMiniBar('Shots', stats.shots?.[0], stats.shots?.[1])}${renderMiniBar('xG', stats.xg?.[0], stats.xg?.[1])}</div><div class="card"><div class="section-header"><h2 class="section-title">Key <span>events</span></h2></div>${events.length?`<div class="list">${events.map(renderEventRow).join('')}</div>`:'<div class="empty">No event feed available.</div>'}</div><div class="split"><div class="card"><div class="section-header"><h2 class="section-title">Home <span>lineup</span></h2></div>${renderLineupTeam(homeLine,homeName,homeId)}</div><div class="card"><div class="section-header"><h2 class="section-title">Away <span>lineup</span></h2></div>${renderLineupTeam(awayLine,awayName,awayId)}</div></div></div><aside class="stack"><div class="card sidebar-card"><div class="section-header"><h2 class="section-title">Fixture <span>info</span></h2></div><div class="info-grid"><div class="info-item"><label>Date</label><div>${escapeHtml(formatDate(f?.fixture?.date))}</div></div><div class="info-item"><label>Status</label><div>${escapeHtml(status)}</div></div><div class="info-item"><label>Referee</label><div>${escapeHtml(fixName(f?.fixture?.referee||'—'))}</div></div><div class="info-item"><label>Venue</label><div>${escapeHtml(venue||'—')}</div></div></div></div></aside></section>`;
    setTitle(`${homeName} vs ${awayName} — TransferZoneAI`,`Match stats, lineups and events for ${homeName} vs ${awayName}.`);
  }catch(e){
    page.innerHTML=`<div class="error">${escapeHtml(e.message||'Could not load this match.')}</div>`;
  }
}
