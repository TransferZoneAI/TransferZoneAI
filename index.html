async function renderHome(){renderHomeShell();document.getElementById('homeLeagues').innerHTML='<div class="loading">Loading leagues...</div>';document.getElementById('homeMatches').innerHTML='<div class="loading">Loading matches...</div>';document.getElementById('homeTransfers').innerHTML='<div class="loading">Loading transfers...</div>';setTitle('TransferZoneAI — Football Intelligence','Transfermarkt-style football data for players, clubs, leagues, transfers and live fixtures.');try{const ids=[39,140,135,78,61,179,94,203];const leagues=await Promise.all(ids.map(id=>apiFetch('leagues',{id,current:'true'}).then(r=>r.response?.[0]).catch(()=>null)));document.getElementById('homeLeagues').innerHTML=leagues.filter(Boolean).map(l=>`<a class="league-card" href="${leaguePath(l.league.id,l.league.name)}" onclick="event.preventDefault(); openLeague(${l.league.id}, ${jsa(l.league.name)}, ${Number(CURRENT_SEASON)});"><div class="search-avatar">${imgOrFallback(l.league.logo,l.league.name)}</div><div><div class="strong">${escapeHtml(l.league.name)}</div><div class="mini">${escapeHtml(l.country?.name||'—')}</div></div><div class="mini gold">${escapeHtml(l.league.type||'League')}</div></a>`).join('')||'<div class="empty">No leagues found.</div>'}catch(e){document.getElementById('homeLeagues').innerHTML='<div class="error">Could not load leagues.</div>'}try{const [live,next]=await Promise.all([apiFetch('fixtures',{live:'all'}).catch(()=>({response:[]})),apiFetch('fixtures',{next:12}).catch(()=>({response:[]}))]);const rows=[...(live.response||[]),...(next.response||[])].slice(0,12);document.getElementById('homeMatches').innerHTML=rows.map(renderMatchCard).join('')||'<div class="empty">No matches found.</div>'}catch(e){document.getElementById('homeMatches').innerHTML='<div class="error">Could not load matches.</div>'}try{const tr=await apiFetch('transfers',{team:33}).catch(()=>({response:[]}));const rows=(tr.response||[]).slice(0,8);document.getElementById('homeTransfers').innerHTM async function runSearch(){const q=document.getElementById('globalSearch').value.trim();if(!q||q.length<2){document.getElementById('searchResults').classList.remove('open');return}const box=document.getElementById('searchResults');box.innerHTML='<div class="loading">Searching...</div>';box.classList.add('open');try{const variants=buildSearchVariants(q);const [teamResponses,playerResponses,leagueResponses]=await Promise.all([Promise.all(variants.map(v=>apiFetch('teams',{search:v}).catch(()=>({response:[]})))),Promise.all(variants.map(v=>apiFetch('players/profiles',{search:v}).catch(()=>({response:[]})))),Promise.all(variants.map(v=>apiFetch('leagues',{search:v,current:'true'}).catch(()=>({response:[]}))))]);const allTeams=dedupeBy(teamResponses.flatMap(r=>r.response||[]),t=>String(t?.team?.id||t?.team?.name||Math.random()));const allPlayers=dedupeBy(playerResponses.flatMap(r=>r.response||[]),p=>String((p?.player||p)?.id||Math.random()));const allLeagues=dedupeBy(leagueResponses.flatMap(r=>r.response||[]),l=>`${l?.league?.id||l?.league?.name||''}_${l?.country?.name||''}`);const rows=[];allPlayers.filter(p=>textMatchesSearch((p.player||p)?.name,q)).slice(0,5).forEach(p=>{const pl=p.player||p;rows.push({type:'Player',name:fixName(pl.name||''),sub:fixEncoding(pl.nationality||''),image:pl.photo,onClick:()=>openPlayer(pl.id,pl.name)})});allTeams.filter(t=>textMatchesSearch(t.team?.name,q)||textMatchesSearch(t.team?.country,q)).slice(0,5).forEach(t=>rows.push({type:'Club',name:fixName(t.team?.name||''),sub:fixEncoding(t.team?.country||''),image:t.team?.logo,onClick:()=>openClub(t.team.id,t.team.name)}));allLeagues.filter(l=>textMatchesSearch(l.league?.name,q)||textMatchesSearch(l.country?.name,q)).slice(0,5).forEach(l=>rows.push({type:'League',name:fixEncoding(l.league?.name||''),sub:fixEncoding(l.country?.name||''),image:l.league?.logo,onClick:()=>openLeague(l.league.id,l.league.name,CURRENT_SEASON)}));box.innerHTML=rows.length?rows.map((r,i)=>`<div class="search-item" onc function getCompetitionType(stat){const league=String(stat?.league?.name||'').toLowerCase().trim();const team=String(stat?.team?.name||'').toLowerCase().trim();const teamCountry=String(stat?.team?.country||'').toLowerCase().trim();const isNationalFlag=stat?.team?.national===true;if(!league&&!team)return 'ignore';if(/friendlies clubs|club friendlies/.test(league))return 'ignore';const isNational=isNationalFlag||/\bu\d{1,2}\b/.test(team)||/national team|women national/.test(team)||(teamCountry&&team&&teamCountry===team)||/^(sweden|england|spain|france|germany|italy|portugal|netherlands|belgium|norway|denmark|iceland|brazil|argentina|mexico|usa|croatia|serbia|turkey|poland|switzerland|austria|scotland|wales|ireland|northern ireland|czech republic|slovakia|slovenia|romania|hungary|greece|ukraine|morocco|japan|south korea|australia)$/i.test(stat?.team?.name||'')||(/nations league|euro championship|world cup|copa america|africa cup of nations|asian cup|friendlies/.test(league)&&!league.includes('clubs'));if(isNational)return 'national';if(/champions league|europa league|conference league|copa libertadores|copa sudamericana|afc champions|club world cup|qualification/.test(league))return 'international';if(/emirates cup|fa cup|league cup|super cup|copa|trophy|play-offs|playoffs|cup/.test(league))return 'cup';return 'league'}

function zeroAgg(){return {games:{appearences:0,lineups:0,minutes:0},substitutes:{in:0,out:0,bench:0},goals:{total:0,assists:0,conceded:0,saves:0},shots:{total:0,on:0},passes:{total:0,key:0,accuracy:0},tackles:{total:0,blocks:0,interceptions:0},duels:{total:0,won:0},dribbles:{attempts:0,success:0,past:0},fouls:{drawn:0,committed:0},cards:{yellow:0,yellowred:0,red:0},penalty:{won:0,commited:0,scored:0,missed:0,saved:0},ratingSum:0,ratingCount:0}}
function addToAgg(agg,s){const add=(obj,path,val)=>{const keys=path.split('.');let ref=obj;for(let i=0;i<keys.length-1;i++) ref=ref[keys[i]];ref[keys[keys.length-1]]+=Number(val||0)};['games.appearences','games.lineups','games.minutes','substitutes.in','substitutes.out','substitutes.bench','goals.total','goals.assists','goals.conceded','goals.saves','shots.total','shots.on','passes.total','passes.key','tackles.total','tackles.blocks','tackles.interceptions','duels.total','duels.won','dribbles.attempts','dribbles.success','dribbles.past','fouls.drawn','fouls.committed','cards.yellow','cards.yellowred','cards.red','penalty.won','penalty.commited','penalty.scored','penalty.missed','penalty.saved'].forEach(path=>{const keys=path.split('.');add(agg,path,s?.[keys[0]]?.[keys[1]])});const rating=Number(s?.games?.rating);if(Number.isFinite(rating)&&rating>0){agg.ratingSum+=rating;agg.ratingCount+=1}return agg}
function aggregatePlayerStats(stats,season,filter='all'){let rows=(stats||[]).filter(s=>Number(s?.league?.season)===Number(season)).filter(s=>getCompetitionType(s)!=='ignore');if(filter==='club')rows=rows.filter(s=>['league','cup','international'].includes(getCompetitionType(s)));if(filter==='national')rows=rows.filter(s=>getCompetitionType(s)==='national');if(filter==='domestic')rows=rows.filter(s=>getCompetitionType(s)==='league');if(filter==='cups')rows=rows.filter(s=>getCompetitionType(s)==='cup');if(filter==='international')rows=rows.filter(s=>getCompetitionType(s)==='international');const total=rows.reduce((agg,s)=>addToAgg(agg,s),zeroAgg());total.avgRating=total.ratingCount?(total.ratingSum/total.ratingCount).toFixed(2):'—';total.goalContrib90=total.games.minutes>0?(((total.goals.total+total.goals.assists)/total.games.minutes)*90).toFixed(2):'—';return {rows,total}}
function buildCompetitionRows(rows){return rows.map(s=>`<tr><td><div class="strong">${escapeHtml(s?.league?.name||'Competition')}</div><div class="mini">${escapeHtml(s?.team?.name||'')}</div></td><td class="align-center">${num(s?.games?.appearences)}</td><td class="align-center">${num(s?.goals?.total)}</td><td class="align-center">${num(s?.goals?.assists)}</td><td class="align-center">${num(s?.cards?.yellow)}</td><td class="align-center">${num(s?.cards?.red)}</td><td class="align-center">${num(s?.games?.minutes)}</td><td class="align-center">${num(s?.games?.rating)}</td></tr>`).join('')}
const buildCompetitionTotalRow=total=>`<tr class="total-row"><td>Total</td><td class="align-center">${num(total.games.appearences)}</td><td class="align-center">${num(total.goals.total)}</td><td class="align-center">${num(total.goals.assists)}</td><td class="align-center">${num(total.cards.yellow)}</td><td class="align-center">${num(total.cards.red)}</td><td class="align-center">${num(total.games.minutes)}</td><td class="align-center">${escapeHtml(total.avgRating)}</td></tr>`;

async function resolvePlayerIdBySlug(slug){
  const queries=[{search: slug.replace(/_/g,' ')},{search: slug.replace(/_/g,'-')}];
  for(const q of queries){
    const data=await apiFetch('players/profiles',q).catch(()=>({response:[]}));
    const rows=data.response||[];
    const hit=rows.find(r=>slugify(fixName(r?.player?.name||r?.name||''))===slug);
    const id=hit?.player?.id||hit?.id||0;
    if(id) return {id:Number(id), name:hit?.player?.name||hit?.name||''};
  }
  return null;
}
async function resolveClubIdBySlug(slug){
  const queries=[{search: slug.replace(/_/g,' ')},{search: slug.replace(/_/g,'-')}];
  for(const q of queries){
    const data=await apiFetch('teams',q).catch(()=>({response:[]}));
    const rows=data.response||[];
    const hit=rows.find(r=>slugify(fixName(r?.team?.name||''))===slug);
    if(hit?.team?.id) return hit.team;
  }
  return null;
}
async function renderPlayerBySlug(slugArg){
  const page=document.getElementById('page-player');
  page.innerHTML='<div class="loading">Loading player...</div>';
  try{
    let id=Number(window.__routePlayerId);
    const slug=slugArg||location.pathname.split('/')[2]||'';
    if(!id&&slug){
      const resolved=await resolvePlayerIdBySlug(slug);
      if(resolved?.id){
        id=Number(resolved.id);
        window.__routePlayerId=id;
      }
    }
    if(!id) throw new Error('Missing player id from search or link context.');
    const {base,seasons}=await fetchPlayerBase(id);
    if(!base?.player) throw new Error('Player not found.');
    state.player.id=id;
    state.player.seasons=seasons;
    state.player.season=Number(state.player.season||seasons[0]||base._fetchedSeason||CURRENT_SEASON);
    state.player.transfers=await fetchPlayerTransfers(id);
    const seasonData=await fetchPlayerFullSeason(id,state.player.season);
    state.player.data=seasonData||base;
    renderPlayerPage();
  }catch(e){
    page.innerHTML=`<div class="error">${escapeHtml(e.message||'Could not load player.')}</div>`;
  }
}

function choosePrimaryLeague(list, season=null, fixtures=[]){const rows=list||[];const excluded=['cup','qualification','play-off','super cup','conference','champions league','europa','friendlies'];const seasonNum=Number(season);const fixtureRows=(fixtures||[]).filter(f=>!excluded.some(v=>`${f?.league?.name||''}`.toLowerCase().includes(v)));const fixtureLeagueCounts={};for(const f of fixtureRows){const name=`${f?.league?.name||''}`;if(!name) continue;const isDomestic=`${f?.league?.country||f?.league?.country_name||''}`.toLowerCase()!=='world'&&`${f?.league?.country||f?.league?.country_name||''}`.toLowerCase()!=='europe';if(!isDomestic) continue;fixtureLeagueCounts[name]=(fixtureLeagueCounts[name]||0)+1}const topFixtureLeague=Object.entries(fixtureLeagueCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];if(topFixtureLeague){const fromList=rows.find(l=>`${l?.league?.name||''}`===topFixtureLeague && (seasonNum?Number(l?.seasons?.[0]?.year||l?.season||seasonNum)===seasonNum:true));if(fromList) return fromList;return {league:{id:fixtureRows.find(f=>`${f?.league?.name||''}`===topFixtureLeague)?.league?.id||null,name:topFixtureLeague,type:'League'},country:{name:fixtureRows.find(f=>`${f?.league?.name||''}`===topFixtureLeague)?.league?.country||''}}}const domestic=rows.find(l=>{const type=`${l?.league?.type||''}`.toLowerCase();const name=`${l?.league?.name||''}`.toLowerCase();const country=`${l?.country?.name||''}`.toLowerCase();return type==='league'&&country!=='world'&&country!=='europe'&&!excluded.some(v=>name.includes(v))});return domestic||rows.find(l=>`${l?.league?.type||''}`.toLowerCase()==='league')||rows[0]||null}

function filterClubTransfersForSeason(transfers, season, leagueLike=null){const {start,end}=getSeasonWindow(season, leagueLike);if(!start||!end) return sortTransfersNewestFirst(transfers||[]);const filtered=(transfers||[]).filter(row=>(row?.transfers||[]).some(t=>{const d=new Date(t?.date||0);return !Number.isNaN(d.getTime())&&d>=start&&d<=end}));return sortTransfersNewestFirst(filtered.length?filtered:(transfers||[]))}

function continentForCountry(name){
  const n=String(name||'').trim().toLowerCase();
  const map={
    europe:['england','scotland','wales','northern ireland','ireland','spain','portugal','france','germany','italy','netherlands','belgium','luxembourg','switzerland','austria','denmark','sweden','norway','finland','iceland','faroe islands','poland','czech republic','slovakia','hungary','romania','bulgaria','greece','croatia','serbia','bosnia','bosnia and herzegovina','slovenia','montenegro','albania','north macedonia','macedonia','kosovo','ukraine','belarus','estonia','latvia','lithuania','moldova','georgia','armenia','azerbaijan','turkey','cyprus','malta','andorra','san marino'],
    south_america:['argentina','brazil','uruguay','paraguay','chile','bolivia','peru','ecuador','colombia','venezuela','guyana','suriname'],
    north_america:['united states','usa','canada','mexico','costa rica','honduras','guatemala','el salvador','nicaragua','panama','jamaica','haiti','dominican republic','trinidad and tobago','cuba','curacao','aruba','belize','barbados','antigua-and-barbuda','antigua and barbuda','grenada','saint kitts and nevis','st. kitts and nevis','saint lucia','st. lucia'],
    asia:['japan','south korea','korea republic','china','india','bangladesh','pakistan','iran','iraq','saudi arabia','qatar','uae','united arab emirates','oman','bahrain','kuwait','jordan','lebanon','syria','uzbekistan','kazakhstan','kyrgyzstan','tajikistan','turkmenistan','afghanistan','thailand','vietnam','indonesia','malaysia','singapore','philippines','myanmar','cambodia','laos','nepal','sri lanka','bhutan','mongolia','hong kong','taiwan','palestine','yemen'],
    africa:['morocco','algeria','tunisia','libya','egypt','south africa','nigeria','ghana','cameroon','senegal','ivory coast','cote d\'ivoire','mali','burkina faso','benin','togo','guinea','gabon','angola','congo','dr congo','democratic republic of the congo','uganda','kenya','tanzania','zambia','zimbabwe','botswana','namibia','mozambique','madagascar','rwanda','ethiopia','sudan'],
    oceania:['australia','new zealand','fiji','papua new guinea','solomon islands','vanuatu','new caledonia','samoa','tahiti'],

ML=`<div class="error">${escapeHtml(e.message||'Could not load league.')}</div>`}}function renderLeaguePage(info,season,standings,scorers,assists,fixtures){

async function renderLeaguesPage(){const page=document.getElementById('page-leagues');page.innerHTML='<div class="loading">Loading leagues...</div>';try{const data=await apiFetch('leagues',{current:'true'}).catch(()=>({response:[]}));const rows=(data.response||[]).filter(r=>r?.league?.id&&r?.league?.name);const cleaned=rows.filter(r=>{const name=String(r?.league?.name||'').toLowerCase();if(name.includes('reserve')||name.includes('reserves')||name.includes('youth')||name.includes('u17')||name.includes('u19')||name.includes('u21')) return false;return true;});const continents=['europe','south_america','north_america','asia','africa','oceania','world','other'];window.__leagueDirState=window.__leagueDirState||{continent:'europe',openCountries:{}};const activeContinent=window.__leagueDirState.continent;const enriched=cleaned.map(r=>({...r,__country:normalizeCountryName(r?.country?.name),__continent:continentForCountry(r?.country?.name),__season:getLeagueRowSeason(r)}));const continentRows=enriched.filter(r=>r.__continent===activeContinent);const countries=[...new Set(continentRows.map(r=>r.__country))].filter(Boolean).sort((a,b)=>a.localeCompare(b)).map(name=>({name,rows:continentRows.filter(r=>r.__country===name)}));const womenPattern=/(women|femin|femeni|frauen|damallsvenskan|dames|feminino|liga f|wsl)/i;const sortFn=(a,b)=>String(a.league?.name||'').localeCompare(String(b.league?.name||''));page.innerHTML=`<div class="card"><div class="toolbar"><h2 class="section-title" style="margin:0">League <span>directory</span></h2><div class="pill">${enriched.length} competitions</div></div><div class="toolbar-right">${continents.map(c=>`<button class="filter-btn ${activeContinent===c?'active':''}" onclick="window.__leagueDirState={continent:'${c}',openCountries:{}}; renderLeaguesPage();">${continentLabel(c)}</button>`).join('')}</div><div class="card" style="padding:16px;margin-top:14px"><div class="toolbar"><h3 class="section-title" style="font-size:22px;margin:0">Countries</h3><div class="mini">${countries.length}</div></div>${countries.length?`<div class="list">${countries.map(country=>{const men=country.rows.filter(r=>!womenPattern.test(String(r?.league?.name||''))).sort(sortFn);const women=country.rows.filter(r=>womenPattern.test(String(r?.league?.name||''))).sort(sortFn);const key=slugify(country.name);const isOpen=!!window.__leagueDirState.openCountries?.[key];return `<details class="country-dropdown" ${isOpen?'open':''} ontoggle="toggleLeagueCountry(${jsa(key)}, this.open)"><summary class="row-link" style="grid-template-columns:1fr auto;list-style:none;cursor:pointer"><div class="strong">${escapeHtml(country.name)}</div><div class="mini">${country.rows.length} competitions</div></summary><div style="padding:12px 0 2px"><div class="split"><div><h4 class="section-title" style="font-size:18px;margin-bottom:10px">Men</h4>${men.length?`<div class="list">${men.map(l=>`<button class="league-card" type="button" style="width:100%;text-align:left;cursor:pointer" onclick='openLeague(${Number(l.league.id)}, ${jsa(l.league.name)}, ${Number(l.__season)})'><div class="search-avatar">${imgOrFallback(l.league?.logo,l.league?.name)}</div><div><div class="strong">${escapeHtml(l.league?.name||'League')}</div><div class="mini">${escapeHtml(l.league?.type||'League')}</div></div><div class="mini gold">${escapeHtml(formatSeasonLabel(l.__season,l))}</div></button>`).join('')}</div>`:'<div class="empty">No men competitions.</div>'}</div><div><h4 class="section-title" style="font-size:18px;margin-bottom:10px">Women</h4>${women.length?`<div class="list">${women.map(l=>`<button class="league-card" type="button" style="width:100%;text-align:left;cursor:pointer" onclick='openLeague(${Number(l.league.id)}, ${jsa(l.league.name)}, ${Number(l.__season)})'><div class="search-avatar">${imgOrFallback(l.league?.logo,l.league?.name)}</div><div><div class="strong">${escapeHtml(l.league?.name||'League')}</div><div class="mini">${escapeHtml(l.league?.type||'League')}</div></div><div class="mini gold">${escapeHtml(formatSeasonLabel(l.__season,l))}</div></button>`).join('')}</div>`:'<div class="empty">No women competitions.</div>'}</div></div></div></details>`}).join('')}</div>`:'<div class="empty">No countries found.</div>'}</div></div>`;setTitle('Leagues — TransferZoneAI','Browse football leagues by continent, country and competition.')}catch(e){page.innerHTML=`<div class="error">${escapeHtml(e.message||'Could not load leagues.')}</div>`}}
