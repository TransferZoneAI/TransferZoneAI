<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransferZoneAI — Football Intelligence</title>
  <meta name="description" content="TransferZoneAI — Transfermarkt-style football data with players, clubs, leagues, matches, transfers and season stats." />
  <link rel="icon" href="/transferzoneai-logo.png">
  <style>
    :root{--bg:#0b0d12;--bg-2:#11151d;--bg-3:#171d28;--surface:#10141c;--surface-2:#151b25;--surface-3:#1a2130;--border:#283143;--text:#eef3fb;--muted:#93a1b7;--gold:#d7ae42;--gold-2:#b58d27;--green:#3fc97a;--red:#f05d67;--blue:#43a0ff;--shadow:0 10px 30px rgba(0,0,0,.35);--radius:14px;--radius-sm:10px;--font-body:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--font-heading:"Barlow Condensed",Impact,Haettenschweiler,"Arial Narrow Bold",sans-serif;--max:1280px}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:radial-gradient(circle at top, rgba(215,174,66,.10), transparent 24%),linear-gradient(180deg, #0a0d12 0%, #0b0d12 55%, #090b10 100%);color:var(--text);font-family:var(--font-body)} a{color:inherit} button,input,select{font:inherit} img{max-width:100%;display:block}
    .container{max-width:var(--max);margin:0 auto;padding:0 18px}.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(18px);background:rgba(10,13,18,.82);border-bottom:1px solid rgba(255,255,255,.06)}
    .topbar-inner{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:18px;min-height:74px}.logo{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-badge{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));border:1px solid rgba(215,174,66,.25);box-shadow:var(--shadow);overflow:hidden;padding:6px}.logo-text{font-family:var(--font-heading);font-size:28px;line-height:1;letter-spacing:.5px}.logo-text span{color:var(--gold)}
    .search-wrap{position:relative}.search-input{width:100%;background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 48px 14px 16px;outline:none}.search-input:focus{border-color:var(--gold)}.search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:linear-gradient(180deg,var(--gold),var(--gold-2));color:#111;padding:8px 12px;border-radius:10px;font-weight:700;cursor:pointer}
    .search-results{position:absolute;left:0;right:0;top:calc(100% + 8px);background:var(--surface-2);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);display:none;overflow:hidden}.search-results.open{display:block}.search-item{padding:12px 14px;display:grid;grid-template-columns:40px 1fr auto;gap:12px;align-items:center;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}.search-item:last-child{border-bottom:none}.search-item:hover{background:rgba(255,255,255,.03)}.search-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg-3);display:grid;place-items:center;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(215,174,66,.3);color:var(--gold);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:700;background:rgba(215,174,66,.08)}.nav{display:flex;gap:6px;flex-wrap:wrap}.nav a{color:var(--muted);text-decoration:none;padding:10px 12px;border-radius:10px;font-weight:600}.nav a.active,.nav a:hover{background:rgba(215,174,66,.10);color:var(--gold)}
    .hero{padding:28px 0 20px}.hero-card{background:linear-gradient(180deg, rgba(20,24,33,.95), rgba(14,18,25,.95));border:1px solid rgba(255,255,255,.06);border-radius:26px;padding:36px 28px;box-shadow:var(--shadow);overflow:hidden;position:relative}.hero-card::before{content:"";position:absolute;inset:auto -10% 60% auto;width:480px;height:240px;background:radial-gradient(circle, rgba(215,174,66,.18), transparent 68%);pointer-events:none}.hero-title{margin:0;font-family:var(--font-heading);font-size:clamp(40px,7vw,72px);line-height:.95;letter-spacing:.4px}.hero-title span{color:var(--gold)}.hero-sub{color:var(--muted);max-width:800px;margin-top:12px;font-size:16px}
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:26px}.stat-card,.card{background:linear-gradient(180deg, rgba(22,27,38,.94), rgba(17,22,31,.94));border:1px solid rgba(255,255,255,.06);border-radius:18px;box-shadow:var(--shadow)}.stat-card{padding:16px}.stat-label{color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.7px}.stat-value{font-family:var(--font-heading);font-size:34px;color:var(--gold);margin-top:6px}
    .main-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px;padding-bottom:40px}.stack{display:grid;gap:18px}.card{padding:18px}.section-title{margin:0 0 14px;font-family:var(--font-heading);font-size:24px;letter-spacing:.4px}.section-title span{color:var(--gold)}.list{display:grid;gap:10px}
    .league-card,.match-card,.transfer-card,.row-link{display:grid;gap:12px;align-items:center;text-decoration:none;color:inherit;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:12px 14px}.league-card{grid-template-columns:40px 1fr auto}.match-card{grid-template-columns:1fr auto 1fr}.transfer-card{grid-template-columns:48px 1fr auto}.row-link:hover,.league-card:hover,.match-card:hover,.transfer-card:hover{border-color:rgba(215,174,66,.28)}.mini{font-size:12px;color:var(--muted)}.strong{font-weight:700}.gold{color:var(--gold)}
    .page{display:none;padding:20px 0 36px}.page.active{display:block}.entity-hero{background:linear-gradient(180deg, rgba(18,22,31,.96), rgba(12,16,22,.96));border:1px solid rgba(255,255,255,.06);border-radius:22px;padding:22px;box-shadow:var(--shadow)}.entity-head{display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:start}.entity-logo{width:108px;height:108px;border-radius:18px;background:var(--bg-3);display:grid;place-items:center;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.entity-kicker{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}.entity-title{margin:0;font-family:var(--font-heading);font-size:54px;line-height:.9}.entity-title span{color:var(--gold)}.entity-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tag{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:var(--text);font-size:13px}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.tab-btn,.filter-btn{border:none;cursor:pointer;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.04);color:var(--muted);font-weight:700}.tab-btn.active,.filter-btn.active{background:rgba(215,174,66,.14);color:var(--gold);border:1px solid rgba(215,174,66,.25)}.tab-panel{margin-top:18px}.panel-grid{display:grid;grid-template-columns:1.45fr .95fr;gap:18px}
    .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:18px}.kpi{padding:14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.kpi .value{font-family:var(--font-heading);font-size:34px}.subtle{color:var(--muted)}
    .table-wrap{overflow:auto;border:1px solid rgba(255,255,255,.06);border-radius:16px;background:rgba(255,255,255,.02)}table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;font-size:14px}th{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);background:rgba(255,255,255,.02)}tr:hover td{background:rgba(255,255,255,.02)}.align-center{text-align:center}.align-right{text-align:right}.total-row td{font-weight:800;color:var(--gold);background:rgba(215,174,66,.06)}
    .split{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.info-item{padding:12px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.info-item label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.squad-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .player-row{display:grid;grid-template-columns:38px 1fr auto;gap:10px;align-items:center;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.player-row:hover{border-color:rgba(215,174,66,.25);cursor:pointer}.avatar{width:38px;height:38px;border-radius:50%;background:var(--bg-3);display:grid;place-items:center;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.toolbar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}.toolbar-right{display:flex;gap:8px;flex-wrap:wrap}.select{background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.08);padding:10px 12px;border-radius:12px}.empty,.error,.loading{padding:28px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.02)}.sidebar-card .list .row-link{grid-template-columns:24px 1fr auto}
    .toast{position:fixed;bottom:16px;right:16px;background:var(--surface-2);color:var(--text);padding:12px 14px;border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow);opacity:0;transform:translateY(10px);pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translateY(0)}
    @media (max-width:1100px){.main-grid,.panel-grid,.split{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}.kpi-grid{grid-template-columns:repeat(3,1fr)}.squad-grid{grid-template-columns:1fr}}
    @media (max-width:760px){.topbar-inner{grid-template-columns:1fr;padding:10px 0}.entity-head{grid-template-columns:1fr}.entity-title{font-size:40px}.stats-row{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
  </style>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <header class="topbar"><div class="container topbar-inner"><a class="logo" href="/" onclick="routeTo('/'); return false;"><div class="logo-badge"><img src="/transferzoneai-logo.png" alt="TransferZoneAI"></div><div class="logo-text">TransferZone<span>AI</span></div></a><div class="search-wrap"><input id="globalSearch" class="search-input" placeholder="Search players, clubs, leagues..." autocomplete="off" /><button class="search-btn" onclick="runSearch()">Search</button><div id="searchResults" class="search-results"></div></div><nav class="nav"><a href="/" data-nav="/" onclick="routeTo('/'); return false;">Home</a><a href="/live" data-nav="/live" onclick="routeTo('/live'); return false;">Live</a><a href="/transfers" data-nav="/transfers" onclick="routeTo('/transfers'); return false;">Transfers</a><a href="/leagues" data-nav="/leagues" onclick="routeTo('/leagues'); return false;">Leagues</a></nav></div></header>
  <main class="container"><section id="page-home" class="page active"></section><section id="page-player" class="page"></section><section id="page-club" class="page"></section><section id="page-league" class="page"></section><section id="page-match" class="page"></section><section id="page-transfers" class="page"></section><section id="page-live" class="page"></section><section id="page-leagues" class="page"></section></main>
  <div class="toast" id="toast"></div>
<script>
const cacheStore = new Map();
const state = { player:{id:null,season:null,filter:'all',data:null,transfers:[],seasons:[],activeTab:'overview'}, club:{id:null,season:null,data:null,leagues:[]}, league:{id:null,season:null,data:null}, match:{id:null,data:null} };
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),2200)}
async function apiFetch(endpoint, params={}){const qs=new URLSearchParams({endpoint,...params}).toString();const res=await fetch(`/api/football?${qs}`);if(!res.ok) throw new Error(`API ${endpoint} failed (${res.status})`);return res.json()}
async function cached(key, fn){if(cacheStore.has(key)) return cacheStore.get(key);const p=Promise.resolve().then(fn);cacheStore.set(key,p);try{return await p}catch(e){cacheStore.delete(key);throw e}}
const escapeHtml=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
const slugify=v=>String(v??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
function setTitle(title, description=''){document.title=title;let meta=document.querySelector('meta[name="description"]');if(!meta){meta=document.createElement('meta');meta.name='description';document.head.appendChild(meta)}meta.content=description||meta.content}
const num=v=>v==null||v===''?'—':String(v), money=v=>v==null?'—':new Intl.NumberFormat('en-US').format(v);
function formatDate(v){if(!v) return '—'; const d=new Date(v); return Number.isNaN(d.getTime())?v:d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function formatKickoff(v){const d=new Date(v); return Number.isNaN(d.getTime())?'—':d.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function isSingleYearCompetition(leagueLike){const txt=`${leagueLike?.league?.name||''} ${leagueLike?.country?.name||''}`.toLowerCase();return ['allsvenskan','superettan','svenska cupen','veikkausliiga','eliteserien','obos-ligaen','world cup','euro qualification','uefa nations league','copa america','major league soccer','mls'].some(v=>txt.includes(v))}
function formatSeasonLabel(year, leagueLike=null){const y=Number(year); if(!Number.isFinite(y)) return '—'; return isSingleYearCompetition(leagueLike)?String(y):`${y}/${String(y+1).slice(-2)}`}
const imgOrFallback=(src,label='',cls='')=>src?`<img src="${src}" alt="${escapeHtml(label)}" class="${cls}" onerror="this.style.display='none';this.parentElement.innerHTML='⚽'">`:'⚽';
const groupBy=(arr,getKey)=>arr.reduce((acc,item)=>((acc[getKey(item)] ||= []).push(item),acc),{});
function updateNav(path){document.querySelectorAll('[data-nav]').forEach(a=>a.classList.toggle('active',a.getAttribute('data-nav')===path))}
function showPage(id){document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));document.getElementById(id).classList.add('active')}
function routeTo(path,replace=false){if(!replace) history.pushState({},'',path);resolveRoute(path)}
window.addEventListener('popstate',()=>resolveRoute(location.pathname));
function resolveRoute(pathname){const parts=pathname.replace(/^\/+|\/+$/g,'').split('/').filter(Boolean);if(!parts.length){updateNav('/');showPage('page-home');renderHome();return}if(parts[0]==='player'&&parts[1]){updateNav('');showPage('page-player');renderPlayerBySlug(parts[1]);return}if(parts[0]==='club'&&parts[1]){updateNav('');showPage('page-club');renderClubBySlug(parts[1]);return}if(parts[0]==='league'&&parts[1]){updateNav('');showPage('page-league');renderLeagueBySlug(parts[1]);return}if(parts[0]==='match'&&parts[1]){updateNav('');showPage('page-match');renderMatch(parts[1]);return}if(parts[0]==='transfers'){updateNav('/transfers');showPage('page-transfers');renderTransfersPage();return}if(parts[0]==='live'){updateNav('/live');showPage('page-live');renderLivePage();return}if(parts[0]==='leagues'){updateNav('/leagues');showPage('page-leagues');renderLeaguesPage();return}routeTo('/',true)}
function renderMatchCard(f){const live=['1H','HT','2H','ET','P'].includes(f?.fixture?.status?.short);const finished=['FT','AET','PEN'].includes(f?.fixture?.status?.short);const status=live?(f.fixture.status.elapsed?`${f.fixture.status.elapsed}'`:'LIVE'):finished?'FT':formatKickoff(f.fixture.date);const score=finished||live?`${num(f.goals?.home)} - ${num(f.goals?.away)}`:'vs';return `<a class="row-link" href="/match/${f.fixture.id}" onclick="event.preventDefault(); openMatch(${f.fixture.id});"><div class="mini">${escapeHtml(f.league?.name||'')}</div><div class="match-card"><div><div class="strong">${escapeHtml(f.teams?.home?.name||'Home')}</div><div class="mini">${escapeHtml(f.teams?.away?.name||'Away')}</div></div><div class="strong ${live?'gold':''}" style="font-family:var(--font-heading);font-size:28px">${escapeHtml(score)}</div><div class="align-right"><div class="strong">${escapeHtml(status)}</div><div class="mini">${live?'Live':finished?'Finished':'Kickoff'}</div></div></div></a>`}
function renderTransferCardForTeamSearch(row){const player=row.player||{};const transfers=row.transfers||[];const latest=transfers.filter(t=>t.date).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];if(!latest) return '';return `<a class="transfer-card" href="/player/${slugify(player.name||'player')}" onclick="event.preventDefault(); openPlayer(${player.id}, ${JSON.stringify(player.name||'Player')});"><div class="avatar">${imgOrFallback(player.photo, player.name)}</div><div><div class="strong">${escapeHtml(player.name||'Player')}</div><div class="mini">${escapeHtml(latest.teams?.out?.name||'Unknown')} → <span class="gold">${escapeHtml(latest.teams?.in?.name||'Unknown')}</span></div></div><div class="mini">${escapeHtml(latest.type||'Transfer')}</div></a>`}
function renderHomeShell(){document.getElementById('page-home').innerHTML=`<section class="hero"><div class="hero-card"><h1 class="hero-title">Football <span>Intelligence</span></h1><div class="hero-sub">A cleaner Transfermarkt-style foundation for players, clubs, leagues, live matches and transfers — built around season logic, competition rows and proper totals.</div><div class="stats-row"><div class="stat-card"><div class="stat-label">Coverage</div><div class="stat-value">900+</div><div class="mini">Leagues</div></div><div class="stat-card"><div class="stat-label">Database</div><div class="stat-value">500K+</div><div class="mini">Players</div></div><div class="stat-card"><div class="stat-label">Tracking</div><div class="stat-value">Live</div><div class="mini">Fixtures & scores</div></div><div class="stat-card"><div class="stat-label">Focus</div><div class="stat-value">Data</div><div class="mini">Correct competition totals</div></div></div></div></section><section class="main-grid"><div class="stack"><div class="card"><h2 class="section-title">Top <span>Leagues</span></h2><div id="homeLeagues" class="list"></div></div><div class="card"><h2 class="section-title">Live & <span>Upcoming</span></h2><div id="homeMatches" class="list"></div></div></div><aside class="stack"><div class="card sidebar-card"><h2 class="section-title">Recent <span>Transfers</span></h2><div id="homeTransfers" class="list"></div></div><div class="card sidebar-card"><h2 class="section-title">Quick <span>Links</span></h2><div class="list"><a class="row-link" href="/live" onclick="routeTo('/live'); return false;"><span>•</span><div>Live matches</div><div class="mini">Now</div></a><a class="row-link" href="/transfers" onclick="routeTo('/transfers'); return false;"><span>•</span><div>Transfers</div><div class="mini">Market</div></a><a class="row-link" href="/leagues" onclick="routeTo('/leagues'); return false;"><span>•</span><div>All leagues</div><div class="mini">Tables</div></a></div></div></aside></section>`}
async function renderHome(){renderHomeShell();document.getElementById('homeLeagues').innerHTML='<div class="loading">Loading leagues...</div>';document.getElementById('homeMatches').innerHTML='<div class="loading">Loading matches...</div>';document.getElementById('homeTransfers').innerHTML='<div class="loading">Loading transfers...</div>';setTitle('TransferZoneAI — Football Intelligence','Transfermarkt-style football data for players, clubs, leagues, transfers and live fixtures.');try{const ids=[39,140,135,78,61,179,94,203];const leagues=await Promise.all(ids.map(id=>apiFetch('leagues',{id,current:'true'}).then(r=>r.response?.[0]).catch(()=>null)));document.getElementById('homeLeagues').innerHTML=leagues.filter(Boolean).map(l=>`<a class="league-card" href="/league/${slugify(l.league.name)}" onclick="event.preventDefault(); openLeague(${l.league.id}, ${JSON.stringify(l.league.name)}, ${Number(new Date().getFullYear()-1)});"><div class="search-avatar">${imgOrFallback(l.league.logo,l.league.name)}</div><div><div class="strong">${escapeHtml(l.league.name)}</div><div class="mini">${escapeHtml(l.country?.name||'—')}</div></div><div class="mini gold">${escapeHtml(l.league.type||'League')}</div></a>`).join('')||'<div class="empty">No leagues found.</div>'}catch(e){document.getElementById('homeLeagues').innerHTML='<div class="error">Could not load leagues.</div>'}try{const [live,next]=await Promise.all([apiFetch('fixtures',{live:'all'}).catch(()=>({response:[]})),apiFetch('fixtures',{next:12}).catch(()=>({response:[]}))]);const rows=[...(live.response||[]),...(next.response||[])].slice(0,12);document.getElementById('homeMatches').innerHTML=rows.map(renderMatchCard).join('')||'<div class="empty">No matches found.</div>'}catch(e){document.getElementById('homeMatches').innerHTML='<div class="error">Could not load matches.</div>'}try{const tr=await apiFetch('transfers',{team:33}).catch(()=>({response:[]}));const rows=(tr.response||[]).slice(0,8);document.getElementById('homeTransfers').innerHTML=rows.map(renderTransferCardForTeamSearch).join('')||'<div class="empty">No transfers found.</div>'}catch(e){document.getElementById('homeTransfers').innerHTML='<div class="error">Could not load transfers.</div>'}}
async function runSearch(){const q=document.getElementById('globalSearch').value.trim();if(!q||q.length<2){document.getElementById('searchResults').classList.remove('open');return}const box=document.getElementById('searchResults');box.innerHTML='<div class="loading">Searching...</div>';box.classList.add('open');try{const [teams,players,leagues]=await Promise.all([apiFetch('teams',{search:q}).catch(()=>({response:[]})),apiFetch('players/profiles',{search:q}).catch(()=>({response:[]})),apiFetch('leagues',{search:q,current:'true'}).catch(()=>({response:[]}))]);const rows=[];(players.response||[]).slice(0,5).forEach(p=>{const pl=p.player||p;rows.push({type:'Player',name:pl.name,sub:pl.nationality||'',image:pl.photo,onClick:()=>openPlayer(pl.id,pl.name)})});(teams.response||[]).slice(0,5).forEach(t=>rows.push({type:'Club',name:t.team?.name,sub:t.team?.country||'',image:t.team?.logo,onClick:()=>openClub(t.team.id,t.team.name)}));(leagues.response||[]).slice(0,5).forEach(l=>rows.push({type:'League',name:l.league?.name,sub:l.country?.name||'',image:l.league?.logo,onClick:()=>openLeague(l.league.id,l.league.name,new Date().getFullYear()-1)}));box.innerHTML=rows.length?rows.map((r,i)=>`<div class="search-item" onclick="window.__sr_${i}()"><div class="search-avatar">${imgOrFallback(r.image,r.name)}</div><div><div class="strong">${escapeHtml(r.name)}</div><div class="mini">${escapeHtml(r.sub)}</div></div><div class="pill">${escapeHtml(r.type)}</div></div>`).join(''):'<div class="empty">No results found.</div>';rows.forEach((r,i)=>window[`__sr_${i}`]=()=>{box.classList.remove('open');r.onClick()})}catch(e){box.innerHTML='<div class="error">Search failed.</div>'}}

function getCompetitionType(stat){const league=String(stat?.league?.name||'').toLowerCase().trim();const team=String(stat?.team?.name||'').toLowerCase().trim();const teamCountry=String(stat?.team?.country||'').toLowerCase().trim();const isNationalFlag=stat?.team?.national===true;if(!league&&!team)return 'ignore';if(/friendlies clubs|club friendlies/.test(league))return 'ignore';const isNational=isNationalFlag||/\bu\d{1,2}\b/.test(team)||/national team|women national/.test(team)||(teamCountry&&team&&teamCountry===team)||/^(sweden|england|spain|france|germany|italy|portugal|netherlands|belgium|norway|denmark|iceland|brazil|argentina|mexico|usa|croatia|serbia|turkey|poland|switzerland|austria|scotland|wales|ireland|northern ireland|czech republic|slovakia|slovenia|romania|hungary|greece|ukraine|morocco|japan|south korea|australia)$/i.test(stat?.team?.name||'')||(/nations league|euro championship|world cup|copa america|africa cup of nations|asian cup|friendlies/.test(league)&&!league.includes('clubs'));if(isNational)return 'national';if(/champions league|europa league|conference league|copa libertadores|copa sudamericana|afc champions|club world cup|qualification/.test(league))return 'international';if(/emirates cup|fa cup|league cup|super cup|copa|trophy|play-offs|playoffs|cup/.test(league))return 'cup';return 'league'}
function isNationalTeamStat(stat){return getCompetitionType(stat)==='national'}

function isInternationalClubStat(stat){return getCompetitionType(stat)==='international'}
function pickPrimaryClubStat(stats,season){const rows=(stats||[]).filter(stat=>Number(stat?.league?.season)===Number(season)&&['league','cup','international'].includes(getCompetitionType(stat)));if(!rows.length)return null;return rows.sort((a,b)=>(Number(b?.games?.minutes||0)-Number(a?.games?.minutes||0))||(Number(b?.games?.appearences||0)-Number(a?.games?.appearences||0)))[0]}
function zeroAgg(){return {games:{appearences:0,lineups:0,minutes:0},substitutes:{in:0,out:0,bench:0},goals:{total:0,assists:0,conceded:0,saves:0},shots:{total:0,on:0},passes:{total:0,key:0,accuracy:0},tackles:{total:0,blocks:0,interceptions:0},duels:{total:0,won:0},dribbles:{attempts:0,success:0,past:0},fouls:{drawn:0,committed:0},cards:{yellow:0,yellowred:0,red:0},penalty:{won:0,commited:0,scored:0,missed:0,saved:0},ratingSum:0,ratingCount:0}}
function addToAgg(agg,s){const add=(obj,path,val)=>{const keys=path.split('.');let ref=obj;for(let i=0;i<keys.length-1;i++) ref=ref[keys[i]];ref[keys[keys.length-1]]+=Number(val||0)};['games.appearences','games.lineups','games.minutes','substitutes.in','substitutes.out','substitutes.bench','goals.total','goals.assists','goals.conceded','goals.saves','shots.total','shots.on','passes.total','passes.key','tackles.total','tackles.blocks','tackles.interceptions','duels.total','duels.won','dribbles.attempts','dribbles.success','dribbles.past','fouls.drawn','fouls.committed','cards.yellow','cards.yellowred','cards.red','penalty.won','penalty.commited','penalty.scored','penalty.missed','penalty.saved'].forEach(path=>{const keys=path.split('.');add(agg,path,s?.[keys[0]]?.[keys[1]])});const rating=Number(s?.games?.rating);if(Number.isFinite(rating)&&rating>0){agg.ratingSum+=rating;agg.ratingCount+=1}return agg}
function aggregatePlayerStats(stats,season,filter='all'){let rows=(stats||[]).filter(s=>Number(s?.league?.season)===Number(season)).filter(s=>getCompetitionType(s)!=='ignore');if(filter==='club')rows=rows.filter(s=>['league','cup','international'].includes(getCompetitionType(s)));if(filter==='national')rows=rows.filter(s=>getCompetitionType(s)==='national');if(filter==='domestic')rows=rows.filter(s=>getCompetitionType(s)==='league');if(filter==='cups')rows=rows.filter(s=>getCompetitionType(s)==='cup');if(filter==='international')rows=rows.filter(s=>getCompetitionType(s)==='international');const total=rows.reduce((agg,s)=>addToAgg(agg,s),zeroAgg());total.avgRating=total.ratingCount?(total.ratingSum/total.ratingCount).toFixed(2):'—';total.goalContrib90=total.games.minutes>0?(((total.goals.total+total.goals.assists)/total.games.minutes)*90).toFixed(2):'—';return {rows,total}}
function buildCompetitionRows(rows){return rows.map(s=>`<tr><td><div class="strong">${escapeHtml(s?.league?.name||'Competition')}</div><div class="mini">${escapeHtml(s?.team?.name||'')}</div></td><td class="align-center">${num(s?.games?.appearences)}</td><td class="align-center">${num(s?.goals?.total)}</td><td class="align-center">${num(s?.goals?.assists)}</td><td class="align-center">${num(s?.cards?.yellow)}</td><td class="align-center">${num(s?.cards?.red)}</td><td class="align-center">${num(s?.games?.minutes)}</td><td class="align-center">${num(s?.games?.rating)}</td></tr>`).join('')}

function renderClubPage(bundle,fixtures,transfers,primaryLeague){const t=bundle.info.team||{};const v=bundle.info.venue||{};const squad=bundle.squad||[];const grouped=Object.entries(groupBy(fixtures,f=>f.league?.name||'Other')).sort((a,b)=>b[1].length-a[1].length);const summary=grouped.map(([name,rows])=>{const played=rows.filter(r=>['FT','AET','PEN'].includes(r?.fixture?.status?.short)).length;const wins=rows.filter(r=>['FT','AET','PEN'].includes(r?.fixture?.status?.short)&&((r.teams.home.id===t.id&&r.goals.home>r.goals.away)||(r.teams.away.id===t.id&&r.goals.away>r.goals.home))).length;return {name,played,wins,rows}});return `<div class="entity-hero"><div class="entity-head"><div class="entity-logo">${imgOrFallback(t.logo,t.name)}</div><div><div class="entity-kicker">Club profile</div><h1 class="entity-title">${escapeHtml(t.name||'Club')}</h1><div class="entity-meta"><span class="tag">${escapeHtml(t.country||'—')}</span><span class="tag">Founded: ${escapeHtml(num(t.founded))}</span><span class="tag">Stadium: ${escapeHtml(v.name||'—')}</span><span class="tag">Capacity: ${escapeHtml(money(v.capacity))}</span>${primaryLeague?.league?.id?`<a class="tag" href="/league/${slugify(primaryLeague.league.name)}" onclick="event.preventDefault(); openLeague(${primaryLeague.league.id}, ${JSON.stringify(primaryLeague.league.name)}, ${state.club.season});">${escapeHtml(primaryLeague.league.name)}</a>`:''}</div></div><div class="toolbar-right"><select class="select" onchange="changeClubSeason(this.value)">${Array.from({length:7},(_,i)=>(new Date().getFullYear()-1)-i).map(y=>`<option value="${y}" ${Number(y)===Number(state.club.season)?'selected':''}>${formatSeasonLabel(y,primaryLeague)}</option>`).join('')}</select></div></div><div class="panel-grid"><div class="stack"><div class="card"><h2 class="section-title">Overview <span>& structure</span></h2><div class="info-grid"><div class="info-item"><label>League</label><div class="strong">${escapeHtml(primaryLeague?.league?.name||'—')}</div></div><div class="info-item"><label>Squad size</label><div class="strong">${escapeHtml(num(squad.length))}</div></div><div class="info-item"><label>City</label><div class="strong">${escapeHtml(v.city||'—')}</div></div><div class="info-item"><label>Country</label><div class="strong">${escapeHtml(t.country||'—')}</div></div></div></div><div class="card"><div class="toolbar"><h2 class="section-title" style="margin:0">Competitions <span>${escapeHtml(formatSeasonLabel(state.club.season,primaryLeague))}</span></h2></div><div class="table-wrap"><table><thead><tr><th>Competition</th><th class="align-center">Matches</th><th class="align-center">Wins</th><th class="align-center">Upcoming</th></tr></thead><tbody>${summary.map(c=>`<tr><td>${escapeHtml(c.name)}</td><td class="align-center">${c.rows.length}</td><td class="align-center">${c.wins}</td><td class="align-center">${c.rows.filter(r=>!['FT','AET','PEN'].includes(r?.fixture?.status?.short)).length}</td></tr>`).join('')||'<tr><td colspan="4" class="align-center subtle">No fixtures found.</td></tr>'}</tbody></table></div></div><div class="card"><h2 class="section-title">Recent <span>fixtures</span></h2><div class="list">${fixtures.slice(0,12).map(renderMatchCard).join('')||'<div class="empty">No fixtures found.</div>'}</div></div></div><div class="stack"><div class="card"><h2 class="section-title">Squad <span>list</span></h2><div class="squad-grid">${squad.map(p=>`<div class="player-row" onclick="openPlayer(${p.id}, ${JSON.stringify(p.name)});"><div class="avatar">${imgOrFallback('',p.name)}</div><div><div class="strong">${escapeHtml(p.name)}</div><div class="mini">${escapeHtml(p.position||'—')}</div></div><div class="mini">#${escapeHtml(num(p.number))}</div></div>`).join('')||'<div class="empty">No squad found.</div>'}</div></div><div class="card"><h2 class="section-title">Transfers <span>market</span></h2><div class="list">${transfers.slice(0,12).map(renderTransferCardForTeamSearch).join('')||'<div class="empty">No async function changeClubSeason(season){state.club.season=Number(season);renderClubBySlug()}

async function fetchLeagueDirectory(){
  return cached('leagueDirectory:all', async ()=>{
    const data = await apiFetch('leagues', {}).catch(()=>({response:[]}));
    const rows = (data.response || []).filter(Boolean);
    return rows;
  });
}
function normalizeRegionName(raw){
  const v = String(raw||'').trim().toLowerCase();
  if (v.includes('europe')) return 'Europe';
  if (v.includes('south america')) return 'South America';
  if (v.includes('north america')) return 'North America';
  if (v.includes('asia')) return 'Asia';
  if (v.includes('africa')) return 'Africa';
  if (v.includes('oceania')) return 'Oceania';
  if (v.includes('world')) return 'World';
  return 'Other';
}
function isWomenCompetition(row){
  const league = String(row?.league?.name || '').toLowerCase();
  const country = String(row?.country?.name || '').toLowerCase();
  return league.includes('women') || league.includes('feminine') || league.includes('ladies') || country.includes('women');
}
function isYouthOrReserveCompetition(row){
  const name = String(row?.league?.name || '').toLowerCase();
  return /u\d{1,2}\b|youth|reserve|reserves|reserve league/.test(name);
}
function getLeagueSeasonForRow(row){
  const seasons = row?.seasons || [];
  const current = seasons.find(s => s.current);
  const latest = [...seasons].map(s=>Number(s.year)).filter(Boolean).sort((a,b)=>b-a)[0];
  return Number(current?.year || latest || new Date().getFullYear()-1);
}
function makeLeagueSlugMap(rows){
  const map = new Map();
  (rows||[]).forEach(r=>{
    const slug = slugify(r?.league?.name || '');
    if (slug && !map.has(slug)) map.set(slug, r);
  });
  return map;
}
async function resolveLeagueContextFromSlug(slug){
  const all = await fetchLeagueDirectory();
  const map = makeLeagueSlugMap(all);
  return map.get(slug) || null;
}

async function renderLeagueBySlug(slugFromRoute){
  const page=document.getElementById('page-league');
  page.innerHTML='<div class="loading">Loading league...</div>';
  try{
    let leagueId=Number(window.__routeLeagueId || state.league.id || 0);
    let season=Number(window.__routeLeagueSeason || state.league.season || 0);
    let leagueInfo=null;

    if(!leagueId){
      const resolved = await resolveLeagueContextFromSlug(slugFromRoute || '');
      if(!resolved?.league?.id) throw new Error('Missing league id from search or navigation context.');
      leagueId = Number(resolved.league.id);
      season = Number(season || getLeagueSeasonForRow(resolved));
      leagueInfo = resolved;
      window.__routeLeagueId = leagueId;
      window.__routeLeagueSeason = season;
    }

    if(!season) season = new Date().getFullYear()-1;

    state.league.id=leagueId;
    state.league.season=season;

    const [freshLeagueInfo,standings,scorers,assists,fixtures]=await Promise.all([
      leagueInfo ? Promise.resolve(leagueInfo) : apiFetch('leagues',{id:leagueId,current:'true'}).then(r=>r.response?.[0]||null).catch(()=>null),
      apiFetch('standings',{league:leagueId,season}).then(r=>r.response?.[0]?.league?.standings?.[0]||[]).catch(()=>[]),
      apiFetch('players/topscorers',{league:leagueId,season}).then(r=>r.response||[]).catch(()=>[]),
      apiFetch('players/topassists',{league:leagueId,season}).then(r=>r.response||[]).catch(()=>[]),
      apiFetch('fixtures',{league:leagueId,season,next:12}).then(r=>r.response||[]).catch(()=>[])
    ]);
    page.innerHTML=renderLeaguePage(freshLeagueInfo,season,standings,scorers,assists,fixtures);
    setTitle(`${freshLeagueInfo?.league?.name||'League'} — TransferZoneAI`,'League page with standings, scorers, assists and upcoming fixtures.');
  }catch(e){
    page.innerHTML=`<div class="error">${escapeHtml(e.message||'Could not load league.')}</div>`;
  }
}
function renderLeaguePage(info,season,standings,scorers,assists,fixtures){const league=info?.league||{};const country=info?.country||{};return `<div class="entity-hero"><div class="entity-head"><div class="entity-logo">${imgOrFallback(league.logo,league.name)}</div><div><div class="entity-kicker">League profile</div><h1 class="entity-title">${escapeHtml(league.name||'League')}</h1><div class="entity-meta"><span class="tag">${escapeHtml(country.name||'—')}</span><span class="tag">Season ${escapeHtml(formatSeasonLabel(season,info))}</span><span class="tag">${escapeHtml(league.type||'League')}</span></div></div></div><div class="panel-grid"><div class="stack"><div class="card"><h2 class="section-title">Standings <span>table</span></h2><div class="table-wrap"><table><thead><tr><th>#</th><th>Club</th><th class="align-center">P</th><th class="align-center">W</th><th class="align-center">D</th><th class="align-center">L</th><th class="align-center">GD</th><th class="align-center">Pts</th></tr></thead><tbody>${standings.map(r=>`<tr onclick="openClub(${r.team.id}, ${JSON.stringify(r.team.name)})" style="cursor:pointer"><td>${r.rank}</td><td><div class="strong">${escapeHtml(r.team.name)}</div></td><td class="align-center">${r.all?.played}</td><td class="align-center">${r.all?.win}</td><td class="align-center">${r.all?.draw}</td><td class="align-center">${r.all?.lose}</td><td class="align-center">${r.goalsDiff}</td><td class="align-center strong">${r.points}</td></tr>`).join('')||'<tr><td colspan="8" class="align-center subtle">No standings found.</td></tr>'}</tbody></table></div></div><div class="card"><h2 class="section-title">Upcoming <span>fixtures</span></h2><div class="list">${fixtures.map(renderMatchCard).join('')||'<div class="empty">No fixtures found.</div>'}</div></div></div><div class="stack"><div class="card"><h2 class="section-title">Top <span>scorers</span></h2><div class="list">${scorers.slice(0,10).map((p,i)=>`<div class="player-row" onclick="openPlayer(${p.player.id}, ${JSON.stringify(p.player.name)})"><div class="avatar">${imgOrFallback(p.player.photo,p.player.name)}</div><div><div class="strong">${i+1}. ${escapeHtml(p.player.name)}</div><div class="mini">${escapeHtml(p.statistics?.[0]?.team?.name||'—')}</div></div><div class="strong gold">${num(p.statistics?.[0]?.goals?.total)}</div></div>`).join('')||'<div class="empty">No scorers found.</div>'}</div></div><div class="card"><h2 class="section-title">Top <span>assists</span></h2><div class="list">${assists.slice(0,10).map((p,i)=>`<div class="player-row" onclick="openPlayer(${p.player.id}, ${JSON.stringify(p.player.name)})"><div class="avatar">${imgOrFallback(p.player.photo,p.player.name)}</div><div><div class="strong">${i+1}. ${escapeHtml(p.player.name)}</div><div class="mini">${escapeHtml(p.statistics?.[0]?.team?.name||'—')}</div></div><div class="strong gold">${num(p.statistics?.[0]?.goals?.assists)}</div></div>`).join('')||'<div class="empty">No assists found.</div>'}</div></div></div></div></div>`}
async function renderMatch(matchId){const page=document.getElementById('page-match');page.innerHTML='<div class="loading">Loading match...</div>';try{const id=Number(window.__routeMatchId||matchId);const [fixtureData,eventsData,statsData,lineupsData]=await Promise.all([apiFetch('fixtures',{id}).then(r=>r.response?.[0]||null),apiFetch('fixtures/events',{fixture:id}).then(r=>r.response||[]).catch(()=>[]),apiFetch('fixtures/statistics',{fixture:id}).then(r=>r.response||[]).catch(()=>[]),apiFetch('fixtures/lineups',{fixture:id}).then(r=>r.response||[]).catch(()=>[])]);if(!fixtureData) throw new Error('Match not found.');const f=fixtureData;page.innerHTML=`<div class="entity-hero"><div class="entity-head"><div class="entity-logo">${imgOrFallback(f.teams?.home?.logo,f.teams?.home?.name)}</div><div><div class="entity-kicker">${escapeHtml(f.league?.name||'Match')}</div><h1 class="entity-title">${escapeHtml(f.teams?.home?.name||'Home')} <span>${num(f.goals?.home)} - ${num(f.goals?.away)}</span> ${escapeHtml(f.teams?.away?.name||'Away')}</h1><div class="entity-meta"><span class="tag">${escapeHtml(f.fixture?.status?.long||'—')}</span><span class="tag">${escapeHtml(formatKickoff(f.fixture?.date))}</span><span class="tag">Venue: ${escapeHtml(f.fixture?.venue?.name||'—')}</span></div></div><div class="entity-logo">${imgOrFallback(f.teams?.away?.logo,f.teams?.away?.name)}</div></div><div class="panel-grid"><div class="stack"><div class="card"><h2 class="section-title">Match <span>events</span></h2><div class="table-wrap"><table><thead><tr><th>Min</th><th>Type</th><th>Team</th><th>Player</th><th>Detail</th></tr></thead><tbody>${eventsData.map(e=>`<tr><td>${num(e.time?.elapsed)}'</td><td>${escapeHtml(e.type||'—')}</td><td>${escapeHtml(e.team?.name||'—')}</td><td>${escapeHtml(e.player?.name||'—')}</td><td>${escapeHtml(e.detail||'—')}</td></tr>`).join('')||'<tr><td colspan="5" class="align-center subtle">No events found.</td></tr>'}</tbody></table></div></div></div><div class="stack"><div class="card"><h2 class="section-title">Match <span>stats</span></h2><div class="list">${renderFixtureStats(statsData)}</div></div><div class="card"><h2 class="section-title">Lineups <span>summary</span></h2><div class="list">${lineupsData.map(l=>`<div class="row-link"><div class="strong">${escapeHtml(l.team?.name||'Team')}</div><div class="mini">Formation ${escapeHtml(l.formation||'—')}</div></div>`).join('')||'<div class="empty">No lineups found.</div>'}</div></div></div></div></div>`;setTitle(`${f.teams?.home?.name} vs ${f.teams?.away?.name} — TransferZoneAI`,`Match page for ${f.teams?.home?.name} vs ${f.teams?.away?.name}.`)}catch(e){page.innerHTML=`<div class="error">${escapeHtml(e.message||'Could not load match.')}</div>`}}
function renderFixtureStats(statsData){if(!statsData?.length) return '<div class="empty">No statistics found.</div>';const home=statsData[0], away=statsData[1];const homeMap=Object.fromEntries((home.statistics||[]).map(x=>[x.type,x.value]));const awayMap=Object.fromEntries((away.statistics||[]).map(x=>[x.type,x.value]));const keys=Array.from(new Set([...Object.keys(homeMap),...Object.keys(awayMap)]));return keys.map(k=>`<div class="row-link" style="grid-template-columns:80px 1fr 80px"><div class="strong align-center">${escapeHtml(num(homeMap[k]))}</div><div class="align-center">${escapeHtml(k)}</div><div class="strong align-center">${escapeHtml(num(awayMap[k]))}</div></div>`).join('')}
async function renderTransfersPage(){const page=document.getElementById('page-transfers');page.innerHTML='<div class="loading">Loading transfers...</div>';try{const sampleTeams=[33,34,40,541,50,529,49,47];const batches=await Promise.all(sampleTeams.map(id=>fetchTeamTransfers(id).catch(()=>[])));const rows=batches.flat().slice(0,60);page.innerHTML=`<div class="card"><h2 class="section-title">Transfer <span>market</span></h2><div class="list">${rows.map(renderTransferCardForTeamSearch).join('')||'<div class="empty">No transfers found.</div>'}</div></div>`;setTitle('Transfers — TransferZoneAI','Transfer market overview.')}catch(e){page.innerHTML='<div class="error">Could not load transfers.</div>'}}
async function renderLivePage(){const page=document.getElementById('page-live');page.innerHTML='<div class="loading">Loading live matches...</div>';try{const [live,upcoming]=await Promise.all([apiFetch('fixtures',{live:'all'}).then(r=>r.response||[]).catch(()=>[]),apiFetch('fixtures',{next:40}).then(r=>r.response||[]).catch(()=>[])]);const rows=[...live,...upcoming];page.innerHTML=`<div class="card"><div class="toolbar"><h2 class="section-title" style="margin:0">Live & <span>upcoming</span></h2><div class="pill">${rows.length} matches</div></div><div class="list">${rows.map(renderMatchCard).join('')||'<div class="empty">No matches found.</div>'}</div></div>`;setTitle('Live matches — TransferZoneAI','Live football fixtures and upcoming matches.')}catch(e){page.innerHTML='<div class="error">Could not load live page.</div>'}}
async function renderLeaguesPage(){
  const page=document.getElementById('page-leagues');
  page.innerHTML='<div class="loading">Loading leagues...</div>';
  try{
    const all = (await fetchLeagueDirectory()).filter(r=>!isYouthOrReserveCompetition(r));
    const regions = ['Europe','South America','North America','Asia','Africa','Oceania','World','Other'];
    const currentRegion = state.leaguesRegion || 'Europe';
    const currentCountry = state.leaguesCountry || '';

    const groupedByRegion = {};
    all.forEach(row=>{
      const region = normalizeRegionName(row?.country?.continent);
      (groupedByRegion[region] ||= []).push(row);
    });

    const regionRows = groupedByRegion[currentRegion] || [];
    const countryMap = {};
    regionRows.forEach(row=>{
      const country = String(row?.country?.name || 'Unknown');
      (countryMap[country] ||= []).push(row);
    });

    const sortedCountries = Object.keys(countryMap).sort((a,b)=>a.localeCompare(b));
    const selectedCountry = currentCountry && countryMap[currentCountry] ? currentCountry : (sortedCountries[0] || '');
    state.leaguesCountry = selectedCountry;

    const countryCards = sortedCountries.map(country=>{
      const active = country === selectedCountry;
      const count = countryMap[country].length;
      return `<button class="row-link" style="grid-template-columns:1fr auto;cursor:pointer;${active?'border-color:rgba(215,174,66,.35);background:rgba(215,174,66,.06)':''}" onclick="state.leaguesCountry=${JSON.stringify(country)};renderLeaguesPage()"><div class="strong">${escapeHtml(country)}</div><div class="mini">${count} competitions</div></button>`;
    }).join('');

    let detailHtml = '<div class="empty">No countries found.</div>';
    if(selectedCountry){
      const rows = [...countryMap[selectedCountry]];
      const men = rows.filter(r=>!isWomenCompetition(r)).sort((a,b)=>String(a.league?.name||'').localeCompare(String(b.league?.name||'')));
      const women = rows.filter(r=>isWomenCompetition(r)).sort((a,b)=>String(a.league?.name||'').localeCompare(String(b.league?.name||'')));

      const renderLeagueLink = (l)=>`<a class="league-card" href="/league/${slugify(l.league?.name||'league')}" onclick="event.preventDefault(); openLeague(${Number(l.league?.id||0)}, ${JSON.stringify(l.league?.name||'League')}, ${getLeagueSeasonForRow(l)});"><div class="search-avatar">${imgOrFallback(l.league?.logo,l.league?.name)}</div><div><div class="strong">${escapeHtml(l.league?.name||'League')}</div><div class="mini">${escapeHtml(l.league?.type||'Competition')}</div></div><div class="mini gold">${escapeHtml(formatSeasonLabel(getLeagueSeasonForRow(l), l))}</div></a>`;

      detailHtml = `
        <div class="card">
          <div class="toolbar">
            <h3 class="section-title" style="margin:0">${escapeHtml(selectedCountry)}</h3>
            <div class="pill">${rows.length} competitions</div>
          </div>
          <div class="split">
            <div>
              <h4 class="section-title" style="font-size:18px;margin-bottom:12px">Men</h4>
              <div class="list">${men.length ? men.map(renderLeagueLink).join('') : '<div class="empty">No men competitions.</div>'}</div>
            </div>
            <div>
              <h4 class="section-title" style="font-size:18px;margin-bottom:12px">Women</h4>
              <div class="list">${women.length ? women.map(renderLeagueLink).join('') : '<div class="empty">No women competitions.</div>'}</div>
            </div>
          </div>
        </div>`;
    }

    page.innerHTML = `
      <div class="card">
        <div class="toolbar">
          <h2 class="section-title" style="margin:0">League <span>directory</span></h2>
          <div class="pill">${all.length} competitions</div>
        </div>
        <div class="tabs" style="margin-bottom:18px">
          ${regions.map(region=>`<button class="filter-btn ${region===currentRegion?'active':''}" onclick="state.leaguesRegion=${JSON.stringify(region)};state.leaguesCountry='';renderLeaguesPage()">${escapeHtml(region)}</button>`).join('')}
        </div>
        <div class="panel-grid" style="grid-template-columns:320px minmax(0,1fr)">
          <div class="stack">${countryCards || '<div class="empty">No countries found.</div>'}</div>
          <div>${detailHtml}</div>
        </div>
      </div>`;
    setTitle('Leagues — TransferZoneAI','Browse leagues by continent, country, and men/women competitions.');
  }catch(e){
    page.innerHTML = `<div class="error">${escapeHtml(e.message||'Could not load leagues.')}</div>`;
  }
}
